site_name: Exponential Jyotish Companion Docs
site_description: Internal product, architecture, schema, prompt, and eval context for Jyotish Companion.
site_url: https://pranavhere01.github.io/exponential-jyotish-companion-docs/
repo_url: https://github.com/Pranavhere01/exponential-jyotish-companion-docs
repo_name: Pranavhere01/exponential-jyotish-companion-docs
docs_dir: docs
site_dir: site
strict: true

theme:
  name: material
  features:
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - search.highlight
    - toc.follow
    - content.code.copy

plugins:
  - search

nav:
  - Home: index.md
  - Start Here:
      - 00-start-here/index.md
      - Knowledge Map: 00-start-here/knowledge-map.md
      - Docs Site Guide: 00-start-here/docs-site-guide.md
      - Version Manifest: 00-start-here/version-manifest.md
  - Product:
      - 10-product/index.md
      - Way Forward: 10-product/way-forward.md
      - PRD v0.2: 10-product/prd-v0.2.md
      - PM First-Principles Guide: 10-product/pm-first-principles-guide.md
  - Architecture:
      - 20-architecture/index.md
      - System Design v0.2: 20-architecture/system-design-v0.2.md
  - Data And Schema:
      - 30-data-and-schema/index.md
      - Schema v0.2 Base: 30-data-and-schema/schema-v0.2-base.md
      - Schema v0.3 Change Spec: 30-data-and-schema/schema-v0.3-change-spec.md
      - Schema v0.3 Discovery And Plan: 30-data-and-schema/schema-v0.3-discovery-and-plan.md
  - AI Quality:
      - 40-ai-quality/index.md
      - Prompts:
          - 40-ai-quality/prompts/index.md
          - Astrologer Persona v0.2: 40-ai-quality/prompts/astrologer-persona-v0.2.md
          - Profile Synthesizer v0.2: 40-ai-quality/prompts/profile-synthesizer-v0.2.md
          - Memory Extractor v0.2: 40-ai-quality/prompts/memory-extractor-v0.2.md
          - Prediction Evaluator v0.2: 40-ai-quality/prompts/prediction-evaluator-v0.2.md
      - Evals:
          - 40-ai-quality/evals/index.md
          - Model Router Validation v0.1: 40-ai-quality/evals/model-router-validation-v0.1.md
          - Responsible Prediction v0.1: 40-ai-quality/evals/responsible-prediction-v0.1.md
  - Operations:
      - 50-operations/index.md
      - Context Versioning SOP: 50-operations/context-versioning-sop.md
      - Repository Split Execution Plan: 50-operations/repo-split-execution-plan.md
      - GitHub Setup: 50-operations/github-setup.md
      - External Publish Runbook: 50-operations/external-publish-runbook.md
      - Completion Audit: 50-operations/completion-audit.md
  - Decisions:
      - 60-decisions/index.md
      - ADR Index: 60-decisions/adr/index.md
      - ADR 0001: 60-decisions/adr/0001-provider-neutral-embeddings.md
      - ADR 0002: 60-decisions/adr/0002-safe-knowledge-rag.md
      - ADR 0003: 60-decisions/adr/0003-extension-ready-analysis-model.md
      - ADR 0004: 60-decisions/adr/0004-model-router-and-open-model-strategy.md
      - ADR 0005: 60-decisions/adr/0005-responsible-prediction-ux.md
      - ADR 0006: 60-decisions/adr/0006-end-of-chat-memory-review.md
  - Archive:
      - 90-archive/index.md
      - Source Materials: 90-archive/source-materials/index.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - fenced_code
  - footnotes
  - tables
  - toc:
      permalink: true

exclude_docs: |
  90-archive/source-materials/original-html/*.html
