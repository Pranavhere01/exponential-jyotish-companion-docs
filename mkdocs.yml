site_name: Exponential Jyotish Companion Docs
site_description: Internal product, architecture, schema, prompt, and eval context for Jyotish Companion.
site_url: https://pranavhere01.github.io/exponential-jyotish-companion-docs/
repo_url: https://github.com/Pranavhere01/exponential-jyotish-companion-docs
repo_name: Pranavhere01/exponential-jyotish-companion-docs
docs_dir: docs
site_dir: site
strict: true

theme:
  name: material
  features:
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - search.highlight
    - toc.follow
    - content.code.copy

plugins:
  - search

nav:
  - Home: index.md
  - Handbook:
      - handbook/index.md
      - Knowledge Architecture: handbook/knowledge-architecture.md
      - Knowledge Map: handbook/knowledge-map.md
      - Contribution Guide: handbook/contribution-guide.md
      - Version Manifest: handbook/version-manifest.md
  - Product:
      - product/index.md
      - Strategy:
          - Way Forward: product/strategy/way-forward.md
      - Requirements:
          - PRD v0.2: product/requirements/prd-v0.2.md
      - Guides:
          - PM First-Principles Guide: product/guides/pm-first-principles-guide.md
  - Architecture:
      - architecture/index.md
      - System:
          - System Design v0.2: architecture/system/system-design-v0.2.md
      - Patterns:
          - architecture/patterns/index.md
          - Multi-Turn Chat Harness v0: architecture/patterns/chat-harness/README.md
  - Engineering:
      - engineering/index.md
      - Data Model:
          - engineering/data-model/index.md
          - Schema v0.2 Base: engineering/data-model/schema-v0.2-base.md
          - Schema v0.3 Change Spec: engineering/data-model/schema-v0.3-change-spec.md
          - Schema v0.3 Discovery And Plan: engineering/data-model/schema-v0.3-discovery-and-plan.md
  - AI:
      - ai/index.md
      - Prompts:
          - ai/prompts/index.md
          - Astrologer Persona v0.2: ai/prompts/astrologer-persona-v0.2.md
          - Profile Synthesizer v0.2: ai/prompts/profile-synthesizer-v0.2.md
          - Memory Extractor v0.2: ai/prompts/memory-extractor-v0.2.md
          - Prediction Evaluator v0.2: ai/prompts/prediction-evaluator-v0.2.md
      - Evaluation:
          - ai/evaluation/index.md
          - Model Router Validation v0.1: ai/evaluation/model-router-validation-v0.1.md
          - Responsible Prediction v0.1: ai/evaluation/responsible-prediction-v0.1.md
  - Governance:
      - governance/index.md
      - Decisions:
          - governance/decisions/index.md
          - ADR Index: governance/decisions/adr/index.md
          - ADR 0001: governance/decisions/adr/0001-provider-neutral-embeddings.md
          - ADR 0002: governance/decisions/adr/0002-safe-knowledge-rag.md
          - ADR 0003: governance/decisions/adr/0003-extension-ready-analysis-model.md
          - ADR 0004: governance/decisions/adr/0004-model-router-and-open-model-strategy.md
          - ADR 0005: governance/decisions/adr/0005-responsible-prediction-ux.md
          - ADR 0006: governance/decisions/adr/0006-end-of-chat-memory-review.md
      - Standards:
          - governance/standards/index.md
          - Context Versioning SOP: governance/standards/context-versioning-sop.md
  - Operations:
      - operations/index.md
      - Repository:
          - operations/repository/index.md
          - GitHub Setup: operations/repository/github-setup.md
          - Repository Split Execution Plan: operations/repository/repo-split-execution-plan.md
      - Publishing:
          - operations/publishing/index.md
          - External Publish Runbook: operations/publishing/external-publish-runbook.md
      - Audits:
          - operations/audits/index.md
          - Completion Audit: operations/audits/completion-audit.md
  - Archive:
      - archive/index.md
      - Source Materials: archive/source-materials/index.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - fenced_code
  - footnotes
  - tables
  - toc:
      permalink: true

exclude_docs: |
  archive/source-materials/original-html/*.html
